<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Solar Orbiting</title>

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial;
        }

        #title {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        #title h1 {
            margin: 0;
            font-size: 32px;
        }

        #title p {
            margin-top: 5px;
            color: #ccc;
        }

        #credits {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: left;
            font-size: 13px;
            color: #aaa;
            line-height: 1.6;
        }

        #credits p {
            margin: 0;
        }

        .credit-title {
            margin-bottom: 6px;
            color: #fff;
            font-size: 14px;
        }

        /* 💧 CLEAN TRANSPARENT PANEL */
        #sunCalc {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 210px;

            padding: 16px;
            border-radius: 12px;

            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);

            border: 1px solid rgba(255,255,255,0.1);

            box-shadow: 0 6px 20px rgba(0,0,0,0.4);

            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #sunCalc b {
            text-align: center;
            font-size: 14px;
            margin-bottom: 4px;
            color: #f0f0f0;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .field label {
            font-size: 11px;
            color: #bbb;
        }

        #sunCalc input {
            width: 100%;
            padding: 6px;

            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;

            color: white;
            outline: none;
            font-size: 12px;
        }

        #sunCalc input:focus {
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
        }

        #sunCalc button {
            width: 100%;
            padding: 7px;

            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);

            color: white;
            border-radius: 6px;
            cursor: pointer;

            font-size: 12px;
            transition: 0.2s;
        }

        #sunCalc button:hover {
            background: rgba(255,255,255,0.15);
        }

        #result {
            margin-top: 6px;
            text-align: center;
            font-size: 12px;
            color: #ddd;
            line-height: 1.4;
        }
    </style>
</head>

<body>

    <div id="title">
        <h1>Solar Orbiting</h1>
        <p>A mini solar system simulation</p>
    </div>

    <!-- 💧 ALIGNED PANEL -->
    <div id="sunCalc">
        <b>Sunrise / Sunset</b>

        <div class="field">
            <label>Latitude</label>
            <input id="lat">
        </div>

        <div class="field">
            <label>Longitude</label>
            <input id="lon">
        </div>

        <button onclick="useLocation()">Auto Detect</button>
        <button onclick="calculateSun()">Calculate</button>

        <div id="result">--</div>
    </div>

    <div id="credits">
        <p class="credit-title">Project by:</p>
        <p>Om Bodkhe</p>
        <p>Arjun Bhavsar</p>
        <p>Pranjal Miratkar</p>
        <p>Aayush Gadsing</p>
        <p>Aditri Patil</p>
        <p>Kaustubh Patil</p>
        <p>Vinit Bhopale</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const stars = [];

        function createStars() {
            stars.length = 0;
            for (let i = 0; i < 120; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.5,
                    alpha: Math.random(),
                    speed: Math.random() * 0.01
                });
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            createStars();
        }

        window.addEventListener("resize", resize);
        resize();

        function drawStars() {
            stars.forEach(star => {
                star.alpha += star.speed;
                if (star.alpha > 1 || star.alpha < 0) {
                    star.speed *= -1;
                }

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${star.alpha})`;
                ctx.fill();
            });
        }

        function loadImage(src) {
            const img = new Image();
            img.src = src;
            return img;
        }

        const sun = loadImage("sun.png");

        const planets = [
            { name: "Mercury", img: loadImage("mercury.png"), scale: 0.08, speed: 0.004 },
            { name: "Venus", img: loadImage("venus.png"), scale: 0.10, speed: 0.003 },
            { name: "Earth", img: loadImage("earth.png"), scale: 0.15, speed: 0.0025 },
            { name: "Mars", img: loadImage("mars.png"), scale: 0.10, speed: 0.002 },
            { name: "Jupiter", img: loadImage("jupiter.png"), scale: 0.09, speed: 0.0015 },
            { name: "Saturn", img: loadImage("saturn.png"), scale: 0.12, speed: 0.0012 },
            { name: "Uranus", img: loadImage("uranus.png"), scale: 0.11, speed: 0.001 },
            { name: "Neptune", img: loadImage("neptune.png"), scale: 0.11, speed: 0.0008 },
        ];

        let angles = planets.map(() => 0);
        let spins = planets.map(() => 0);

        function animate() {
            requestAnimationFrame(animate);

            const baseGap = 35;
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const minDim = Math.min(canvas.width, canvas.height);
            const maxRadius = minDim * 0.45;
            const gap = maxRadius / (planets.length + 0.5);

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStars();

            const sunSize = 90;

            ctx.drawImage(sun, centerX - sunSize / 2, centerY - sunSize / 2, sunSize, sunSize);

            ctx.fillStyle = "black";
            ctx.font = "bold 14px Arial";
            ctx.textAlign = "center";
            ctx.fillText("Sun", centerX, centerY + 5);

            planets.forEach((planet, i) => {
                const radius = baseGap + gap * (i + 1);

                angles[i] += planet.speed;
                spins[i] += 0.5;

                const x = centerX + radius * Math.cos(angles[i]);
                const y = centerY + radius * Math.sin(angles[i]);

                const size = planet.img.width * planet.scale;

                ctx.beginPath();
                ctx.strokeStyle = "#444";
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.stroke();

                if (planet.img.complete) {
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(spins[i] * Math.PI / 180);

                    ctx.drawImage(planet.img, -size / 2, -size / 2, size, size);

                    if (planet.name === "Earth") {
                        const dx = centerX - x;
                        const dy = centerY - y;

                        const gradient = ctx.createLinearGradient(dx * 0.5, dy * 0.5, -dx * 0.5, -dy * 0.5);
                        gradient.addColorStop(0, "rgba(0,0,0,0)");
                        gradient.addColorStop(1, "rgba(0,0,0,0.6)");

                        ctx.fillStyle = gradient;
                        ctx.beginPath();
                        ctx.arc(0, 0, size / 2, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    ctx.restore();

                    ctx.fillStyle = "white";
                    ctx.font = "12px Arial";
                    ctx.textAlign = "center";
                    ctx.fillText(planet.name, x, y + size / 2 + 12);
                }
            });
        }

        animate();

        function useLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById("lat").value = pos.coords.latitude.toFixed(4);
                document.getElementById("lon").value = pos.coords.longitude.toFixed(4);
            });
        }

        function calculateSun() {
            const lat = parseFloat(document.getElementById("lat").value);
            const lon = parseFloat(document.getElementById("lon").value);

            if (isNaN(lat) || isNaN(lon)) {
                document.getElementById("result").innerText = "Enter valid coordinates";
                return;
            }

            const day = new Date().getDay() + 1;

            const decl = 23.45 * Math.sin((360/365) * (day - 81) * Math.PI/180);

            const ha = Math.acos(
                -Math.tan(lat * Math.PI/180) * Math.tan(decl * Math.PI/180)
            );

            const daylight = (2 * ha * 180/Math.PI) / 15;

            const sunrise = 12 - daylight/2;
            const sunset = 12 + daylight/2;

            function fmt(t){
                let h = Math.floor(t);
                let m = Math.floor((t-h)*60);
                let ampm = h>=12?"PM":"AM";
                h = h%12||12;
                return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
            }

            document.getElementById("result").innerHTML =
                `Sunrise: ${fmt(sunrise)}<br>Sunset: ${fmt(sunset)}`;
        }
    </script>

</body>

</html>
