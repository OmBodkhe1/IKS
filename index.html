<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Solar Orbiting</title>

    <!-- Better Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            color: white;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        #title {
            position: absolute;
            top: 20px;
            left: 20px;
        }

        #title h1 {
            margin: 0;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        #title p {
            margin-top: 6px;
            color: #d0d0d0;
            font-size: 15px;
            font-weight: 400;
        }

        #credits {
            position: absolute;
            bottom: 20px;
            right: 20px;
            text-align: left;
            font-size: 13px;
            color: #ccc;
            line-height: 1.7;
        }

        #credits p {
            margin: 0;
        }

        .credit-title {
            margin-bottom: 8px;
            color: white;
            font-size: 14px;
            font-weight: 600;
        }

        /* GLOWING SUNRISE / SUNSET CARD */
        #sunCalc {
            border: 1px solid rgba(255, 220, 120, 0.18);
            
            position: absolute;
            top: 40px;
            right: 20px;
            width: 210px;

            padding: 16px;
            border-radius: 12px;

            background: radial-gradient(
                circle at top right,
                rgba(255, 210, 90, 0.22),
                rgba(255, 255, 255, 0.05) 40%,
                rgba(255, 255, 255, 0.03) 100%
            );

            backdrop-filter: blur(10px);

            

            box-shadow:
                0 0 18px rgba(255, 180, 50, 0.10),
                0 0 35px rgba(255, 140, 30, 0.7),
                0 0 70px rgba(255, 120, 20, 0.04),
                inset 0 0 18px rgba(255, 200, 100, 0.01);

            display: flex;
            flex-direction: column;
            gap: 8px;

            animation: glowPulse 4s ease-in-out infinite;
        }

        @keyframes glowPulse {
            0% {
                box-shadow:
                    0 0 18px rgba(255, 180, 50, 0.10),
                    0 0 35px rgba(255, 140, 30, 0.07),
                    0 0 70px rgba(255, 120, 20, 0.04),
                    inset 0 0 18px rgba(255, 200, 100, 0.01);
            }

            50% {
                box-shadow:
                    0 0 28px rgba(255, 210, 100, 0.15),
                    0 0 55px rgba(255, 170, 50, 0.10),
                    0 0 95px rgba(255, 130, 20, 0.07),
                    inset 0 0 24px rgba(255, 220, 120, 0.04);
            }

            100% {
                box-shadow:
                    0 0 18px rgba(255, 180, 50, 0.10),
                    0 0 35px rgba(255, 140, 30, 0.07),
                    0 0 70px rgba(255, 120, 20, 0.04),
                    inset 0 0 18px rgba(255, 200, 100, 0.01);
            }
        }

        #sunCalc b {
            text-align: center;
            font-size: 14px;
            margin-bottom: 4px;
            color: #f0f0f0;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .field label {
            font-size: 11px;
            color: #bbb;
        }

        #sunCalc input {
            width: 100%;
            padding: 6px;

            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 6px;

            color: white;
            outline: none;
            font-size: 12px;
            box-sizing: border-box;
        }

        #sunCalc input:focus {
            border-color: rgba(255,255,255,0.3);
            background: rgba(255,255,255,0.1);
        }

        #sunCalc button {
            width: 100%;
            padding: 7px;

            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);

            color: white;
            border-radius: 6px;
            cursor: pointer;

            font-size: 12px;
            transition: 0.2s;
        }

        #sunCalc button:hover {
            background: rgba(255,255,255,0.15);
        }

        #result {
            margin-top: 6px;
            text-align: center;
            font-size: 12px;
            color: #ddd;
            line-height: 1.4;
        }

        canvas {
            display: block;
        }
    </style>
</head>

<body>

    <div id="title">
        <h1>Solar Orbiting</h1>
        <p>A solar system visualization</p>
    </div>

    <div id="sunCalc">
        <b>Sunrise / Sunset</b>

        <div class="field">
            <label>Latitude</label>
            <input id="lat">
        </div>

        <div class="field">
            <label>Longitude</label>
            <input id="lon">
        </div>

        <button onclick="useLocation()">Auto Detect</button>
        <button onclick="calculateSun()">Calculate</button>

        <div id="result">--</div>
    </div>

    <div id="credits">
        <p class="credit-title">Project by:</p>
        <p>Om Bodkhe</p>
        <p>Arjun Bhavsar</p>
        <p>Pranjal Miratkar</p>
        <p>Aayush Gadsing</p>
        <p>Aditri Patil</p>
        <p>Kaustubh Patil</p>
        <p>Vinit Bhopale</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById("canvas");
        const ctx = canvas.getContext("2d");

        const stars = [];

        function createStars() {
            stars.length = 0;
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 1.8,
                    alpha: Math.random(),
                    speed: Math.random() * 0.01
                });
            }
        }

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            createStars();
        }

        window.addEventListener("resize", resize);
        resize();

        function drawStars() {
            stars.forEach(star => {
                star.alpha += star.speed;

                if (star.alpha > 1 || star.alpha < 0) {
                    star.speed *= -1;
                }

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${star.alpha})`;
                ctx.fill();
            });
        }

        function loadImage(src) {
            const img = new Image();
            img.src = src;
            return img;
        }

        const sun = loadImage("sun.png");

        const planets = [
            { name: "Mercury", img: loadImage("mercury.png"), scale: 0.08, speed: 0.0018 },
            { name: "Venus", img: loadImage("venus.png"), scale: 0.10, speed: 0.0015 },
            { name: "Earth", img: loadImage("earth.png"), scale: 0.15, speed: 0.0012 },
            { name: "Mars", img: loadImage("mars.png"), scale: 0.10, speed: 0.0010 },
            { name: "Jupiter", img: loadImage("jupiter.png"), scale: 0.09, speed: 0.0008 },
            { name: "Saturn", img: loadImage("saturn.png"), scale: 0.12, speed: 0.0007 },
            { name: "Uranus", img: loadImage("uranus.png"), scale: 0.11, speed: 0.0006 },
            { name: "Neptune", img: loadImage("neptune.png"), scale: 0.11, speed: 0.0005 }
        ];

        let angles = planets.map(() => 0);
        let spins = planets.map(() => 0);

        function animate() {
            requestAnimationFrame(animate);

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            const minDim = Math.min(canvas.width, canvas.height);
            const maxRadius = minDim * 0.42;
            const gap = maxRadius / (planets.length + 1);
            const baseGap = 40;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawStars();

            const sunSize = 95;

            ctx.drawImage(
                sun,
                centerX - sunSize / 2,
                centerY - sunSize / 2,
                sunSize,
                sunSize
            );

            /* Sun text on top of image */
            ctx.fillStyle = "black";
            ctx.font = "700 14px Poppins";
            ctx.textAlign = "center";
            ctx.fillText("Sun", centerX, centerY + 5);

            planets.forEach((planet, i) => {
                const radius = baseGap + gap * (i + 1);

                angles[i] += planet.speed;
                spins[i] += 0.25;

                const x = centerX + radius * Math.cos(angles[i]);
                const y = centerY + radius * Math.sin(angles[i]);

                const size = planet.img.width * planet.scale || 30;

                ctx.beginPath();
                ctx.strokeStyle = "rgba(255,255,255,0.12)";
                ctx.lineWidth = 1;
                ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
                ctx.stroke();

                if (planet.img.complete) {
                    ctx.save();
                    ctx.translate(x, y);
                    ctx.rotate(spins[i] * Math.PI / 180);

                    ctx.drawImage(
                        planet.img,
                        -size / 2,
                        -size / 2,
                        size,
                        size
                    );

                    ctx.restore();

                    ctx.fillStyle = "white";
                    ctx.font = "12px Poppins";
                    ctx.textAlign = "center";
                    ctx.fillText(
                        planet.name,
                        x,
                        y + size / 2 + 16
                    );
                }
            });
        }

        animate();

        function useLocation() {
            navigator.geolocation.getCurrentPosition(pos => {
                document.getElementById("lat").value =
                    pos.coords.latitude.toFixed(4);

                document.getElementById("lon").value =
                    pos.coords.longitude.toFixed(4);
            });
        }

       function calculateSun() {
            const lat = parseFloat(document.getElementById("lat").value);
            const lon = parseFloat(document.getElementById("lon").value);

            if (isNaN(lat) || isNaN(lon)) {
                document.getElementById("result").innerText = "Enter valid coordinates";
                return;
            }

            const day = new Date().getDay() + 1;

            const decl = 23.45 * Math.sin((360/365) * (day - 81) * Math.PI/180);

            const ha = Math.acos(
                -Math.tan(lat * Math.PI/180) * Math.tan(decl * Math.PI/180)
            );

            const daylight = (2 * ha * 180/Math.PI) / 15;

            const sunrise = 12 - daylight/2;
            const sunset = 12 + daylight/2;

            function fmt(t){
                let h = Math.floor(t);
                let m = Math.floor((t-h)*60);
                let ampm = h>=12?"PM":"AM";
                h = h%12||12;
                return `${h}:${m.toString().padStart(2,'0')} ${ampm}`;
            }

            document.getElementById("result").innerHTML =
                `Sunrise: ${fmt(sunrise)}<br>Sunset: ${fmt(sunset)}`;
        }
    </script>

</body>
</html>
